# Render Blueprint Configuration
# This file configures the Massage Bot backend service on Render
# For Deploy Hooks: Settings > Deploy Hooks in Render Dashboard

services:
  # Backend Web Service
  - type: web
    name: massage-bot-api
    runtime: node
    region: frankfurt
    plan: standard
    branch: master
    rootDir: .
    buildCommand: |
      npm install -g pnpm@9 && \
      pnpm install --frozen-lockfile && \
      cd apps/server && \
      pnpm db:generate && \
      pnpm build
    startCommand: cd apps/server && pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: massage-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: massage-bot-redis
          property: connectionString
      # Secrets to be set in Render Dashboard:
      # - TELEGRAM_BOT_TOKEN
      # - JWT_SECRET
      # - WEBAPP_URL
      # - ADMIN_TELEGRAM_ID

  # Background Worker for BullMQ
  - type: worker
    name: massage-bot-worker
    runtime: node
    region: frankfurt
    plan: standard
    branch: master
    rootDir: .
    buildCommand: |
      npm install -g pnpm@9 && \
      pnpm install --frozen-lockfile && \
      cd apps/server && \
      pnpm db:generate && \
      pnpm build
    startCommand: cd apps/server && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: massage-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: massage-bot-redis
          property: connectionString

# PostgreSQL Database
databases:
  - name: massage-bot-db
    region: frankfurt
    plan: standard
    postgresMajorVersion: 16

# Redis Instance for BullMQ & Sessions
redis:
  - name: massage-bot-redis
    region: frankfurt
    plan: standard
    maxmemoryPolicy: allkeys-lru
