# Render Blueprint Configuration
# This file configures the Massage Bot backend service on Render

services:
  # Backend Web Service (includes workers via imports)
  - type: web
    name: massage-bot-api
    runtime: node
    region: frankfurt
    plan: standard
    branch: master
    rootDir: .
    buildCommand: |
      npm install -g pnpm@9 && \
      pnpm install && \
      cd apps/server && \
      pnpm db:generate && \
      pnpm build
    startCommand: cd apps/server && pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: massage-bot-db
          property: connectionString
      # Redis URL - set manually in Render Dashboard Environment Variables
      # REDIS_URL: rediss://... (from Upstash or other Redis provider)
      # Secrets to be set in Render Dashboard:
      # - TELEGRAM_BOT_TOKEN
      # - JWT_SECRET
      # - WEBAPP_URL
      # - ADMIN_TELEGRAM_ID

# PostgreSQL Database
databases:
  - name: massage-bot-db
    region: frankfurt
    plan: standard
    postgresMajorVersion: 16
